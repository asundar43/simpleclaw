name: Install Smoke (GAR)

on:
  push:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: install-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GAR_REGION: us-central1
  GAR_PROJECT: jarvis-486806
  GAR_REPO: simpleclaw-npm

jobs:
  docs-scope:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.check.outputs.docs_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect docs-only changes
        id: check
        uses: ./.github/actions/detect-docs-changes

  install-smoke-gar:
    needs: [docs-scope]
    if: needs.docs-scope.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure npm for GAR
        run: |
          TOKEN=$(gcloud auth print-access-token)
          npm config set "//${GAR_REGION}-npm.pkg.dev/${GAR_PROJECT}/${GAR_REPO}/:_authToken" "$TOKEN"

      - name: Verify package is viewable on GAR
        run: |
          GAR_REGISTRY="https://${GAR_REGION}-npm.pkg.dev/${GAR_PROJECT}/${GAR_REPO}"
          LATEST=$(npm view simpleclaw version --registry "$GAR_REGISTRY")
          echo "Latest version on GAR: $LATEST"

      - name: Install simpleclaw globally from GAR
        run: |
          GAR_REGISTRY="https://${GAR_REGION}-npm.pkg.dev/${GAR_PROJECT}/${GAR_REPO}"
          # Download the tarball from GAR, then install from the local tarball.
          # This ensures the package itself is fetched from GAR while transitive
          # dependencies (e.g. @agentclientprotocol/sdk) resolve from public npm.
          npm pack simpleclaw@latest --registry "$GAR_REGISTRY"
          npm install -g simpleclaw-*.tgz

      - name: Verify installed version
        run: |
          GAR_REGISTRY="https://${GAR_REGION}-npm.pkg.dev/${GAR_PROJECT}/${GAR_REPO}"
          EXPECTED=$(npm view simpleclaw version --registry "$GAR_REGISTRY")
          INSTALLED=$(simpleclaw --version 2>/dev/null | head -n 1 | tr -d '\r')
          echo "Expected: $EXPECTED, Installed: $INSTALLED"
          if [ "$INSTALLED" != "$EXPECTED" ]; then
            echo "ERROR: expected simpleclaw@${EXPECTED}, got simpleclaw@${INSTALLED}" >&2
            exit 1
          fi

      - name: Sanity check CLI
        env:
          SIMPLECLAW_NO_ONBOARD: "1"
        run: simpleclaw --help >/dev/null
