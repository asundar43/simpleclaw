name: Docker Release

on:
  workflow_call:
    inputs:
      simpleclaw_version:
        description: "SimpleClaw version to install from GAR"
        required: false
        type: string
        default: "latest"
  workflow_dispatch:
    inputs:
      simpleclaw_version:
        description: "SimpleClaw version to install from GAR"
        required: false
        type: string
        default: "latest"

concurrency:
  group: docker-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GAR_REGION: us-central1
  GAR_PROJECT: jarvis-486806
  GAR_REPO: simpleclaw-npm

jobs:
  # Build amd64 image from the pre-built GAR package.
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GAR auth token
        id: gar-token
        run: echo "token=$(gcloud auth print-access-token)" >> "$GITHUB_OUTPUT"

      - name: Resolve image tags (amd64)
        id: tags
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ inputs.simpleclaw_version || 'latest' }}
        run: |
          set -euo pipefail
          tags=()
          if [[ "$VERSION" != "latest" ]]; then
            tags+=("${IMAGE}:${VERSION}-amd64")
            tags+=("${IMAGE}:${VERSION}")
            tags+=("${IMAGE}:latest")
          else
            tags+=("${IMAGE}:latest-amd64")
            tags+=("${IMAGE}:latest")
          fi
          {
            echo "value<<EOF"
            printf "%s\n" "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push amd64 image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gar
          platforms: linux/amd64
          build-args: |
            GAR_AUTH_TOKEN=${{ steps.gar-token.outputs.token }}
            SIMPLECLAW_VERSION=${{ inputs.simpleclaw_version || 'latest' }}
            GAR_REGION=${{ env.GAR_REGION }}
            GAR_PROJECT=${{ env.GAR_PROJECT }}
            GAR_REPO=${{ env.GAR_REPO }}
          tags: ${{ steps.tags.outputs.value }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-cache:amd64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-cache:amd64,mode=max
          provenance: false
          push: true

  # Build arm64 image (disabled — GitHub-hosted ARM runners require a paid plan)
  build-arm64:
    if: false
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GAR auth token
        id: gar-token
        run: echo "token=$(gcloud auth print-access-token)" >> "$GITHUB_OUTPUT"

      - name: Resolve image tags (arm64)
        id: tags
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ inputs.simpleclaw_version || 'latest' }}
        run: |
          set -euo pipefail
          tags=()
          if [[ "$VERSION" != "latest" ]]; then
            tags+=("${IMAGE}:${VERSION}-arm64")
          else
            tags+=("${IMAGE}:latest-arm64")
          fi
          {
            echo "value<<EOF"
            printf "%s\n" "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push arm64 image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gar
          platforms: linux/arm64
          build-args: |
            GAR_AUTH_TOKEN=${{ steps.gar-token.outputs.token }}
            SIMPLECLAW_VERSION=${{ inputs.simpleclaw_version || 'latest' }}
            GAR_REGION=${{ env.GAR_REGION }}
            GAR_PROJECT=${{ env.GAR_PROJECT }}
            GAR_REPO=${{ env.GAR_REPO }}
          tags: ${{ steps.tags.outputs.value }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-cache:arm64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-cache:arm64,mode=max
          provenance: false
          push: true
